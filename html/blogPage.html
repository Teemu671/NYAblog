<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NYAblog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" 
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>
    <!-- Header Navbar -->
    <div class="navbar">
        <div class="navItem logo">
            <a href="/"><img class="logo" src="images/NYAblog_LOGO.png"></a>
        </div>
        <div class="navItem desktop-only">
            <a class="nav-link" href="/login">Login</a>
            <a class="nav-link logout-btn" href="#" onclick="logout()">Logout</a>
        </div>
        <div class="navItem mobile-sidebar">
            <button id="sidebar-toggle">☰</button>
        </div>
    </div>

    <!-- Main content -->
    <div class="main-wrapper">
        <ul class="sidebar">
            <li><a class="nav-link" href="/profile">Your profile</a></li>
            <li><a class="nav-link" href="/writePage">Write a blog</a></li>
            <li class="mobile-login"><a class="nav-link" href="/login">Login</a></li>
            <li class="mobile-login logout-btn"><a class="nav-link" href="#" onclick="logout()">Logout</a></li>
        </ul>
        <div class="content-area">
            <div class="blog-banner">
                <div class="title-container">
                    <img src="" id="post-avatar" alt="">
                    <a class="nav-link" id="post-author" href="/profile"></a>
                </div>
            </div>
            <div class="blog-text-container">
                <div class="blog-text" id="post-display">
                    <h2 id="post-title"> </h2>
                    <div class="post-meta" id="post-meta"></div>
                    <div id="post-body">
                        <p> </p>
                    </div>
                </div>
                <div class="blog-text" id="post-display">
                    <h2 id="post-title"> </h2>
                    <div class="post-meta" id="post-meta"></div>
                    <div id="post-body">
                        <p> </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
<!-- 
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" 
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
 -->

     <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
     <script src="js/blogPage.js"></script>
    <script src="js/logout.js"></script>
    <script>
        $(document).ready(function() {
            $('#sidebar-toggle').click(function() {
                $('.sidebar').toggle();
            });
        });
    </script>
    <script type="module" src="js/user.js"></script>
    <script type="module">

    </script>
  </body>
</html>
