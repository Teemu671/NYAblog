<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NYAblog - Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" 
  integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Header Navbar -->
  <div class="navbar">
    <div class="navItem logo">
      <a href="/"><img class="logo" src="images/NYAblog_LOGO.png"></a>
    </div>
    <div class="navItem desktop-only">
      <a class="nav-link" href="/login">Login</a>
      <a class="nav-link" id="logout-btn" href="#" onclick="logout()">Logout</a>
    </div>
    <div class="navItem mobile-sidebar">
      <button id="sidebar-toggle">☰</button>
    </div>
  </div>
 <div class="main-wrapper">
    <ul class="sidebar">
      <li><a class="nav-link" href="/profile">Your profile</a></li>
      <li><a class="nav-link" href="/writePage">Write a blog</a></li>
      <li class="mobile-login"><a class="nav-link" href="/login">Login</a></li>
      <li id="blog-list">My Blogs:</li>
    </ul>

    <!-- Login content -->
    <div class="login-content">
      <h2 class="login-title">Login</h2>
      <form>
        <!-- Email input -->
        <div class="form-outline mb15">
          <input type="email" id="loginName" class="form-control" />
          <label class="form-label" for="loginName">Email</label>
        </div>

        <!-- Password input -->
        <div class="form-outline mb15">
          <input type="password" id="loginPassword" class="form-control" />
          <label class="form-label" for="loginPassword">Password</label>
        </div>

        <!-- 2 column grid layout -->
        <div class="row mb15">
          <div class="col">
          <!-- Checkbox -->
            <div class="form-check">
              <input class="form-check-input" type="checkbox" value="" id="loginCheck" checked />
              <label class="form-check-label" for="loginCheck"> Remember me </label>
            </div>
          </div>
        </div>

        <!-- Submit button -->
        <button type="submit" class="btn-primary">Sign in</button>

        <!-- Register buttons -->
        <p class="register-prompt">Not a member? <a href="/register">Register</a></p>
      </form>
    </div>
    </div>
    <script src="js/logout.js"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script>
    $(document).ready(function() {
      $('#sidebar-toggle').click(function() {
        $('.sidebar').toggle();
      });
    });
  </script>
  <script type="module" src="js/user.js"></script>
  <script type="module">
    import { User } from "./js/class/user.js";
    const user = new User()
  document.querySelector('form').addEventListener('submit', async function(e) {
    e.preventDefault();

    const email = document.getElementById('loginName').value;
    const password = document.getElementById('loginPassword').value;

    user.login(email, password).then(user => {
      window.location.href="/"
    }).catch(error => {
      alert(error || 'Login failed')
    });

  });
</script>

</body>
</html>
