<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NYAblog - Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" 
  integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Header Navbar -->
  <div class="navbar">
    <div class="navItem logo">
      <a href="index.html"><img class="logo" src="images/NYAblog_LOGO.png"></a>
    </div>
    <div class="navItem desktop-only">
      <a class="nav-link" href="login.html">Login</a>
    </div>
    <div class="navItem mobile-sidebar">
      <button id="sidebar-toggle">☰</button>
    </div>
  </div>

  <!-- Login content -->
  <div class="login-content">
    <h2 class="login-title">Login</h2>
    <form>
      <!-- Email input -->
      <div class="form-outline mb15">
        <input type="email" id="loginName" class="form-control" />
        <label class="form-label" for="loginName">Email or username</label>
      </div>

      <!-- Password input -->
      <div class="form-outline mb15">
        <input type="password" id="loginPassword" class="form-control" />
        <label class="form-label" for="loginPassword">Password</label>
      </div>

      <!-- 2 column grid layout -->
      <div class="row mb15">
        <div class="col">
        <!-- Checkbox -->
          <div class="form-check">
            <input class="form-check-input" type="checkbox" value="" id="loginCheck" checked />
            <label class="form-check-label" for="loginCheck"> Remember me </label>
          </div>
        </div>

        <div class="col">
        <!-- Simple link -->
          <a href="#!">Forgot password?</a>
        </div>
      </div>

      <!-- Submit button -->
      <button type="submit" class="btn-primary">Sign in</button>

      <!-- Register buttons -->
      <p class="register-prompt">Not a member? <a href="register.html">Register</a></p>
    </form>
  </div>
</body>
</html>
