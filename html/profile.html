<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NYAblog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" 
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>
    <!-- Header Navbar -->
    <div class="navbar">
        <div class="navItem logo">
            <a href="/"><img class="logo" src="images/NYAblog_LOGO.png"></a>
        </div>
        <div class="navItem desktop-only">
            <a class="nav-link" href="/login">Login</a>
        </div>
        <div class="navItem mobile-sidebar">
            <button id="sidebar-toggle">☰</button>
        </div>
    </div>
    <div class="main-wrapper">
        <ul class="sidebar">
            <li><a class="nav-link" href="/profile">Profile name</a></li>
            <li><a class="nav-link" href="/writePage">Write a blog</a></li>
            <li class="mobile-login"><a class="nav-link" href="/login">Login</a></li>
        </ul>

        <!-- Main content -->
            <div class="content-area">
                <div class="profile-banner">
                    <div class="username-container">
                        <div class="profile-pic"><img src="https://placehold.co/100x100"></div>
                        <div class="profile-username"> <h1>Username</h1> </div>
                        <button class="changePfpBtn" id="changePfpBtn">Change Profile Picture</button>
                        <input type="file" id="pfp-input" accept="image/*" style="display:none">
                    </div>
                </div>
        <div class="card-grid">
            <div class="card-grid" id="my-post-grid">
            <p style="padding:1rem;">Loading your posts...</p>
            </div>
        </div>
    </div>
<!-- 
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" 
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
 -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script type="module">
  import { User } from './js/class/user.js';

  const API_BASE = "https://cat0s.com:3001";
  const user = new User();

  function escapeHtml(t) {
    return String(t || '').replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Load profile info (username + avatar) ──────────────────────────
  async function loadProfile() {
    if (!user.isLoggedIn) {
      window.location.href = '/login';
      return;
    }

    const res = await fetch(`${API_BASE}/user/uid/${user.id}`);
    const profile = await res.json();

    // Set username in sidebar and banner
    document.querySelectorAll('.profile-username h1, .nav-link[href="/profile"]')
      .forEach(el => el.textContent = profile.display_name || profile.username);

    // Set avatar
    if (profile.avatar_id) {
      const imgRes = await fetch(`${API_BASE}/cdn/image/${profile.avatar_id}`);
      const imgData = await imgRes.json();
      document.querySelector('.profile-pic img').src =
        `${API_BASE}/cdn/${imgData.filename}`;
    }
  }

  // ── Load this user's posts ─────────────────────────────────────────
  async function loadMyPosts() {
    const grid = document.getElementById('my-post-grid');
    const res = await fetch(`${API_BASE}/blog/uid/${user.id}`);
    const posts = await res.json();

    if (!posts.length) {
      grid.innerHTML = '<p style="padding:1rem;">No posts yet.</p>';
      return;
    }

    grid.innerHTML = '';
    posts.forEach(post => {
      const title = escapeHtml(post.title || `Post #${post.post_id}`);
      const wrapper = document.createElement('div');
      wrapper.className = 'card-wrapper';
      wrapper.innerHTML = `
        <a class="card" href="/blogPage?postId=${post.post_id}">
          <img src="${post.image_id
            ? `${API_BASE}/files/${post.image_id}`
            : 'https://placehold.co/400'}" class="card-img-top">
          <div class="card-body">
            <span class="post-tag">${escapeHtml(post.tag || 'Blog')}</span>
            <h5 class="txtcolor">${title}</h5>
          </div>
        </a>`;
      grid.appendChild(wrapper);
    });
  }

  // ── Profile picture upload ─────────────────────────────────────────
  document.getElementById('changePfpBtn').addEventListener('click', () => {
    document.getElementById('pfp-input').click();
  });

  document.getElementById('pfp-input').addEventListener('change', async function () {
    const file = this.files[0];
    if (!file) return;

    // 1. Upload the file
    const formData = new FormData();
    formData.append('sampleFile', file);
    const uploadRes = await fetch(`${API_BASE}/cdn/upload`, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${user.token}` },
      body: formData
    });
    if (!uploadRes.ok) { alert('Upload failed'); return; }
    const { image_id } = await uploadRes.json();

    // 2. Set it as avatar
    await fetch(`${API_BASE}/user/avatar`, {
      method: 'PATCH',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${user.token}`
      },
      body: JSON.stringify({ image_id })
    });

    // 3. Preview immediately
    const imgRes = await fetch(`${API_BASE}/cdn/image/${image_id}`);
    const imgData = await imgRes.json();
    document.querySelector('.profile-pic img').src =
      `${API_BASE}/files/${imgData.filename}`;
  });

  // ── Sidebar toggle ─────────────────────────────────────────────────
  document.getElementById('sidebar-toggle').addEventListener('click', () => {
    document.querySelector('.sidebar').style.display =
      document.querySelector('.sidebar').style.display === 'none' ? '' : 'none';
  });

  loadProfile();
  loadMyPosts();
</script>
  </body>
</html>
