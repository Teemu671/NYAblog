<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NYAblog - Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" 
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Header Navbar -->
    <div class="navbar">
        <div class="navItem logo">
            <a href="/"><img class="logo" src="images/NYAblog_LOGO.png"></a>
        </div>
        <div class="navItem desktop-only">
            <a class="nav-link" href="/login">Login</a>
            <a class="nav-link logout-btn" href="#" onclick="logout()">Logout</a>
        </div>
        <div class="navItem mobile-sidebar">
            <button id="sidebar-toggle">☰</button>
        </div>
    </div>

    <!-- Register Form -->
    <div class="register-content">
        <h2 class="register-title">Create an Account</h2>
        <form>
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" class="form-control" id="username" placeholder="Choose a username">
            </div>

            <div class="form-group">
                <label for="email">Email address</label>
                <input type="email" class="form-control" id="email" placeholder="Enter your email">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" class="form-control" id="password" placeholder="Choose a password">
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" class="form-control" id="confirmPassword" placeholder="Repeat your password">
            </div>

            <div class="post-controls">
                <input type="file" id="image-input" accept="image/*">
                <button type="button" id="upload-btn">Confirm Profile Picture</button>
                <span id="upload-status"></span>
            </div>

            <button type="submit" class="btn btn-primary register-btn">Register</button>

            <p class="login-prompt">Already have an account? <a href="/login">Login here</a></p>
        </form>
    </div>
    <script src="js/logout.js"></script>
<script type="module" src="js/user.js"></script>
<script type="module">
  import { User } from "./js/class/user.js";
  const user = new User()
    document.querySelector('form').addEventListener('submit', async function(e) {
    e.preventDefault();

    const username = document.getElementById('username').value;
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirmPassword').value;

    if (password !== confirmPassword) {
      alert('Passwords do not match');
      return;
    }

    user.register(username, email, password).then(user => {
    window.location.href="login"
    }).catch(error => {
      alert(error)
    })
  });
</script>

</body>
</html>
