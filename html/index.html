<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NYAblog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" 
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>
    <!-- Header Navbar -->
    <div class="navbar">
        <div class="navItem logo">
            <a href="/"><img class="logo" src="images/NYAblog_LOGO.png"></a>
        </div>
        <div class="navItem desktop-only">
            <a class="nav-link" href="/login">Login</a>
        </div>
        <div class="navItem mobile-sidebar">
            <button id="sidebar-toggle">☰</button>
        </div>
    </div>

    <!-- Main content -->
    <div class="main-wrapper">
        <ul class="sidebar">
            <li><a class="nav-link" href="/profile">Profile name</a></li>
            <li><a class="nav-link" href="/writePage">Write a blog</a></li>
            <li class="mobile-login"><a class="nav-link" href="/login">Login</a></li>
            <li id="blog-list">My Blogs:</li>
        </ul>

        <div class="content-area">
            <div class="welcome">
                <h1 class="txtcolor">Welcome to NYAblog</h1>
            </div>
            <div class="card-grid" id="post-grid">
                <div class="empty-state"> Loading posts </div>
            </div>
        </div>
    </div>
<!-- 
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" 
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
 -->

     <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
     <script src="js/posts.js"></script>

    <script>
        $(document).ready(function() {
            $('#sidebar-toggle').click(function() {
                $('.sidebar').toggle();
            });
        });
    </script>
    <script type="module" src="js/user.js"></script>

    <script>
        async function loadMyBlogs() {
        const storedUser = sessionStorage.getItem('user');
        const user = storedUser ? JSON.parse(storedUser) : null;
        if (!user) return; // not logged in, leave sidebar as is

        const response = await fetch(`https://cat0s.com:3001/blog/uid/${user.id}`);
        if (!response.ok) return;
        const posts = await response.json();

        const blogList = document.getElementById('blog-list');
        blogList.innerHTML = 'My Blogs:';

        const items = Array.isArray(posts) ? posts : [posts];
        items.forEach(post => {
            if (!post) return;
            const title = post.text
                ? post.text.replace(/<[^>]*>/g, '').trim().split('\n')[0].slice(0, 30)
                : `Post #${post.post_id}`;
            const li = document.createElement('li');
            li.innerHTML = `<a class="nav-link" href="/blogPage?postId=${post.post_id}">${title}</a>`;
            blogList.appendChild(li);
        });
    }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', loadMyBlogs);
        } else {
            loadMyBlogs();
        }
    </script>

  </body>
</html>
