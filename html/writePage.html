<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NYAblog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" 
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/summernote@0.8.20/dist/summernote-lite.min.css" rel="stylesheet">
  </head>
  <body>
    <!-- Header Navbar -->
    <div class="navbar">
        <div class="navItem logo">
            <a href="index.html"><img class="logo" src="images/NYAblog_LOGO.png"></a>
        </div>
        <div class="navItem">
            <a class="nav-link" href="login.html">Login</a>
        </div>
    </div>

    <!-- Main content -->
    <div class="main-wrapper">
        <ul class="sidebar">
            <li><a class="nav-link" href="profile.html">Profile name</a></li>
            <li><a class="nav-link" href="writePage.html">Write a blog</a></li>
            <li id="blog-list">My Blogs:</li>
        </ul>
        <div class="content-area">
            <div class="blog-banner">
                <div class="title-container">
                    <a class="blog-username" href="profile.html">name of writer</a>
                </div>
            </div>
            <div class="blog-text-container">
                <div class="blog-text">
                    <div id="editor"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/summernote@0.8.20/dist/summernote-lite.min.js"></script>

    <script>
        $(document).ready(function() {
            $('#editor').summernote({
            placeholder: 'Write your blog...',
            height: 300
            });
        });
    </script>

  </body>
</html>
