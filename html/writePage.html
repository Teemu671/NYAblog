<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NYAblog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" 
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/summernote@0.8.20/dist/summernote-lite.min.css" rel="stylesheet">
  </head>
  <body>
    <!-- Header Navbar -->
    <div class="navbar">
        <div class="navItem logo">
            <a href="/"><img class="logo" src="images/NYAblog_LOGO.png"></a>
        </div>
        <div class="navItem desktop-only">
            <a class="nav-link" href="/login">Login</a>
        </div>
        <div class="navItem mobile-sidebar">
            <button id="sidebar-toggle">☰</button>
        </div>
    </div>

    <!-- Main content -->
    <div class="main-wrapper">
        <ul class="sidebar">
            <li><a class="nav-link" href="/profile">Profile name</a></li>
            <li><a class="nav-link" href="/writePage">Write a blog</a></li>
            <li class="mobile-login"><a class="nav-link" href="/login">Login</a></li>
            <li id="blog-list">My Blogs:</li>
        </ul>
        <div class="content-area">
            <div class="blog-banner">
                <div class="title-container">
                    <a class="blog-username" href="/profile">Author</a>
                </div>
            </div>
            <div class="blog-text-container">
                <div class="blog-text">
                    <input type="text" name="title" placeholder="Post title" required>
                    <input type="text" name="tag" placeholder="Tag">
                    <div id="editor"></div>
                    <form id="post-form">
                        <div class="post-controls">
                            
                            <input type="file" id="image-input" accept="image/*">
                            <button type="button" id="upload-btn">Upload Cover Image</button>
                            <span id="upload-status"></span>
                            <button type="submit">Publish</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
<!-- 
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" 
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
 -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/summernote@0.8.20/dist/summernote-lite.min.js"></script>

    <script>
        $(document).ready(function() {
            $('#editor').summernote({
                placeholder: 'Write your blog...',
                height: 300
            });

            $('#sidebar-toggle').click(function() {
                $('.sidebar').toggle();
            });

            $('#post-form').on('submit', async function(event) {
                event.preventDefault();

                const text = $('#editor').summernote('code');
                const title = $('input[name="title"]').val().trim();
                const tag = $('input[name="tag"]').val().trim();
                const storedUser = sessionStorage.getItem('user');
                const user = storedUser ? JSON.parse(storedUser) : null;
                const token = user?.token;

                if (!token) {
                    alert('You must be logged in to publish a post.');
                    return;
                }

                try {
                    const response = await fetch('https://cat0s.com:3001/blog/post', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify({ message: text, title: title, tag: tag, image: uploadedImageId })
                    });

                    if (!response.ok) {
                        const errorData = await response.json().catch(() => ({}));
                        throw new Error(errorData.error || response.statusText);
                    }

                    alert('Post published successfully.');
                    window.location.href = '/';
                } catch (error) {
                    alert('Failed to publish post: ' + error.message);
                }
            });

                        let uploadedImageId = null;

            $('#upload-btn').click(async function () {
                const file = $('#image-input')[0].files[0];
                if (!file) { alert('Pick an image first.'); return; }

                const storedUser = sessionStorage.getItem('user');
                const token = storedUser ? JSON.parse(storedUser)?.token : null;
                if (!token) { alert('You must be logged in.'); return; }

                const formData = new FormData();
                formData.append('sampleFile', file);

                try {
                    await fetch('https://cat0s.com:3001/cdn/upload', {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${token}` },
                        body: formData
                    });

                    const galleryRes = await fetch('https://cat0s.com:3001/cdn/gallery', {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    const gallery = await galleryRes.json();
                    uploadedImageId = gallery[gallery.length - 1].image_id;

                    $('.blog-banner').css('background-image', `url(https://cat0s.com:3001/cdn/image/${uploadedImageId})`);
                    $('#upload-status').text(' Image uploaded');
                } catch (err) {
                    alert('Upload failed: ' + err.message);
                }
            });
        });



    </script>
<script type="module" src="js/user.js"></script>
  </body>
</html>
